<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArXiv Paper Subscriber - Shaoyu</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <style>
        body { background-color: #f5f7fa; font-family: -apple-system, sans-serif; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .domain-section { margin-bottom: 40px; }
        .domain-title { color: #303133; border-bottom: 2px solid #409EFF; padding-bottom: 10px; margin-bottom: 20px; }
        .score-group { margin-left: 20px; margin-bottom: 20px; }
        .score-title { color: #606266; margin-bottom: 15px; display: flex; align-items: center; }
        .paper-card { margin-bottom: 15px; }
        .abstract-zh { font-size: 14px; color: #333; line-height: 1.6; }
        .abstract-en { font-size: 13px; color: #909399; margin-top: 10px; font-style: italic; }
        
        /* 简报样式 */
        .briefing-card { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 30px; border-left: 5px solid #409EFF; box-shadow: 0 2px 12px 0 rgba(0,0,0,0.05); }
        .briefing-tag { font-size: 12px; color: #909399; background: #f4f4f5; padding: 4px 12px; border-radius: 15px; margin-right: 10px; margin-bottom: 10px; display: inline-block; cursor: pointer; transition: all 0.3s; }
        .briefing-tag:hover { background: #e9e9eb; color: #409EFF; transform: translateY(-2px); }

        /* 深度分析区块通用样式 */
        .info-block { padding: 10px; border-radius: 4px; margin: 10px 0; font-size: 13px; line-height: 1.5; }
        .block-reason { background: #f4f4f5; color: #606266; }       /* 分析理由：中性灰 */
        .block-contribution { background: #f9f0ff; color: #606266; } /* 核心贡献：柔和紫 */
        .block-method { background: #fff7e6; color: #606266; }       /* 方法亮点：浅金橙 */
        .block-experiment { background: #f6ffed; color: #606266; }   /* 实验亮点：清新绿 */
        .block-pros { background: #e6fffb; color: #606266; }         /* 优点：薄荷青 */
        .block-cons { background: #fff1f0; color: #606266; }         /* 缺点：淡雅粉 */
        .block-repro { background: #e6f7ff; color: #606266; }        /* 可复现性：天空蓝 */

        .missing-data { color: #F56C6C; font-style: italic; }
        .info-block ul { margin: 5px 0 0 0; padding-left: 20px; }
    </style>
</head>
<body>
<div id="app" class="container">
    <el-header style="text-align: center; margin-bottom: 30px;">
        <h1 style="color: #409EFF;">📚 Research Paper Dashboard</h1>
    </el-header>

    <!-- 本日简报 -->
    <div v-if="briefingStats" class="briefing-card">
        <h3 style="margin-top: 0; color: #303133; display: flex; align-items: center;">
            📊 本日简报 ({{ briefingStats.date }})
        </h3>
        <p style="font-size: 14px; color: #606266; line-height: 1.8; margin-bottom: 15px;">
            今日论文 <strong>{{ briefingStats.total }}</strong> 篇，其中 <span v-html="briefingStats.sourceText"></span>。
        </p>
        <div style="display: flex; flex-wrap: wrap;">
            <div v-for="d in briefingStats.domainBreakdown" :key="d.id" class="briefing-tag" @click="scrollToDomain(d.id)">
                <strong>{{ d.name }}</strong>: {{ d.text }}
            </div>
        </div>
    </div>

    <div v-for="domain in groupedData" :key="domain.name" :id="'domain-' + domain.id" class="domain-section">
        <h2 class="domain-title">📌 {{ domain.name }}</h2>
        
        <el-collapse v-model="activeScoreGroups[domain.id]">
            <el-collapse-item v-for="scoreGroup in domain.scores" :key="scoreGroup.val" :name="scoreGroup.val">
                <template #title>
                    <h3 class="score-title" style="margin: 0 0 0 24px; display: flex; align-items: center;">
                        <el-tag :type="getScoreType(scoreGroup.val)" effect="dark" style="margin-right: 10px;">{{ scoreGroup.val }} 分</el-tag>
                        <span>论文数量: {{ scoreGroup.papers.length }}</span>
                    </h3>
                </template>

                <div class="score-group-content" style="padding: 0 24px;">
                    <el-row :gutter="15">
                        <el-col v-for="paper in scoreGroup.papers" :key="paper.url" :span="24">
                            <el-card class="paper-card" shadow="never">
                                <!-- 基础信息 -->
                                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;">
                                    <div style="flex: 1;">
                                        <el-link :href="paper.url" target="_blank" type="primary" style="font-size: 16px; font-weight: bold; line-height: 1.4;">
                                            {{ paper.title }}
                                        </el-link>
                                        <el-tag v-if="paper.has_code" size="small" type="success" style="margin-left: 8px; vertical-align: middle;">Code</el-tag>
                                    </div>
                                    <span style="font-size: 12px; color: #999; white-space: nowrap; margin-left: 10px;">{{ paper.date }}</span>
                                </div>
                                <div style="font-size: 12px; color: #666; margin-bottom: 10px;">
                                    作者: {{ paper.authors }} | 来源: {{ paper.source }}
                                </div>

                                <!-- ==========================================
                                     样式 5 & 4: 深度研究 (5分及以上不含核心贡献字段)
                                     ========================================== -->
                                <template v-if="paper.score >= 4">
                                    <div class="abstract-zh">
                                        <strong>中文摘要: </strong> 
                                        <span v-if="paper.abstract_zh">{{ paper.abstract_zh }}</span>
                                        <span v-else class="missing-data">获取失败，请检查日志</span>
                                    </div>
                                    <el-collapse style="border: none; margin-top: 10px;">
                                        <el-collapse-item title="查看英文摘要" name="en">
                                            <div class="abstract-en">{{ paper.abstract || '获取失败，请检查日志' }}</div>
                                        </el-collapse-item>
                                    </el-collapse>
                                    
                                    <div class="info-block block-reason">
                                        <strong>🔍 分析理由:</strong> 
                                        <span v-if="paper.reason">{{ paper.reason }}</span>
                                        <span v-else class="missing-data">获取失败，请检查日志</span>
                                    </div>
                                    
                                    <!-- 4/5 分论文不展示核心贡献字段，直接展示亮点 -->
                                    <div class="info-block block-method">
                                        <strong>🔬 方法亮点:</strong>
                                        <ul v-if="paper.method_highlights?.length">
                                            <li v-for="i in paper.method_highlights" :key="i">{{ i }}</li>
                                        </ul>
                                        <span v-else class="missing-data">获取失败，请检查日志</span>
                                    </div>

                                    <div class="info-block block-experiment">
                                        <strong>📊 实验亮点:</strong>
                                        <ul v-if="paper.experiment_highlights?.length">
                                            <li v-for="i in paper.experiment_highlights" :key="i">{{ i }}</li>
                                        </ul>
                                        <span v-else class="missing-data">获取失败，请检查日志</span>
                                    </div>

                                    <div class="info-block block-pros">
                                        <strong>✅ 优点:</strong>
                                        <ul v-if="paper.pros?.length">
                                            <li v-for="i in paper.pros" :key="i">{{ i }}</li>
                                        </ul>
                                        <span v-else class="missing-data">获取失败，请检查日志</span>
                                    </div>

                                    <div class="info-block block-cons">
                                        <strong>❌ 缺点:</strong>
                                        <ul v-if="paper.cons?.length">
                                            <li v-for="i in paper.cons" :key="i">{{ i }}</li>
                                        </ul>
                                        <span v-else class="missing-data">获取失败，请检查日志</span>
                                    </div>

                                    <div class="info-block block-repro">
                                        <strong>🔗 可复现性:</strong> 
                                        <span v-if="paper.reproducibility">{{ paper.reproducibility }}</span>
                                        <span v-else class="missing-data">获取失败，请检查日志</span>
                                    </div>
                                </template>

                                <!-- ==========================================
                                     样式 3: 重点关注 (含核心贡献)
                                     ========================================== -->
                                <template v-else-if="paper.score === 3">
                                    <div class="abstract-zh">
                                        <strong>中文摘要:</strong> 
                                        <span v-if="paper.abstract_zh">{{ paper.abstract_zh }}</span>
                                        <span v-else class="missing-data">获取失败，请检查日志</span>
                                    </div>
                                    <el-collapse style="border: none; margin-top: 10px;">
                                        <el-collapse-item title="查看英文摘要" name="en">
                                            <div class="abstract-en">{{ paper.abstract || '获取失败，请检查日志' }}</div>
                                        </el-collapse-item>
                                    </el-collapse>
                                    <div class="info-block block-reason">
                                        <strong>🔍 分析理由:</strong> 
                                        <span v-if="paper.reason">{{ paper.reason }}</span>
                                        <span v-else class="missing-data">获取失败，请检查日志</span>
                                    </div>
                                    <div class="info-block block-contribution">
                                        <strong>💡 核心贡献:</strong> 
                                        <span v-if="paper.core_contribution">{{ paper.core_contribution }}</span>
                                        <span v-else class="missing-data">获取失败，请检查日志</span>
                                    </div>
                                </template>

                                <!-- ==========================================
                                     样式 2: 简要总结
                                     ========================================== -->
                                <template v-else-if="paper.score === 2">
                                    <div class="abstract-zh">
                                        <strong>中文摘要:</strong> 
                                        <span v-if="paper.abstract_zh">{{ paper.abstract_zh }}</span>
                                        <span v-else-if="paper.score >= 2" style="color: #909399; font-style: italic;">生成中...</span>
                                        <span v-else class="missing-data">获取失败，请检查日志</span>
                                    </div>
                                    <el-collapse style="border: none; margin-top: 10px;">
                                        <el-collapse-item title="查看英文摘要" name="en">
                                            <div class="abstract-en">{{ paper.abstract || '获取失败，请检查日志' }}</div>
                                        </el-collapse-item>
                                    </el-collapse>
                                    <div class="info-block block-reason">
                                        <strong>🔍 分析理由:</strong> 
                                        <span v-if="paper.reason">{{ paper.reason }}</span>
                                        <span v-else class="missing-data">获取失败，请检查日志</span>
                                    </div>
                                </template>

                                <!-- ==========================================
                                     样式 1: 仅记录
                                     ========================================== -->
                                <template v-else-if="paper.score === 1">
                                    <div class="abstract-en" style="font-style: normal; color: #333; line-height: 1.6; font-size: 14px;">
                                        <strong>英文摘要:</strong> {{ paper.abstract || '获取失败，请检查日志' }}
                                    </div>
                                    <div class="info-block block-reason">
                                        <strong>🔍 分析理由:</strong> 
                                        <span v-if="paper.reason">{{ paper.reason }}</span>
                                        <span v-else class="missing-data">获取失败，请检查日志</span>
                                    </div>
                                </template>

                                <!-- 应用价值 -->
                                <div v-if="paper.app_value_score" style="margin-top: 12px; display: flex; align-items: center;">
                                    <span style="font-size: 13px; color: #606266; margin-right: 10px;">应用价值:</span>
                                    <el-rate v-model="paper.app_value_score" disabled show-score text-color="#ff9900" score-template="{value}"></el-rate>
                                </div>
                            </el-card>
                        </col>
                    </row>
                </div>
            </el-collapse-item>
        </el-collapse>
    </div>

    <!-- 返回顶部按钮 -->
    <el-backtop :right="40" :bottom="40">
        <div style="height: 100%; width: 100%; background-color: #f2f5f6; box-shadow: 0 0 6px rgba(0,0,0, .12); text-align: center; line-height: 40px; color: #1989fa; border-radius: 50%;">
            <el-icon :size="20"><arrow-up /></el-icon>
        </div>
    </el-backtop>
</div>

<script>
    const { createApp, ref, computed, onMounted, watch } = Vue;
    const app = createApp({
        setup() {
            const papers = ref([]);
            const domainNames = ref({});
            const activeScoreGroups = ref({});

            const fetchPapers = async () => {
                const res = await fetch('data.json');
                papers.value = await res.json();
            };

            const fetchDomains = async () => {
                try {
                    const res = await fetch('domains.json');
                    domainNames.value = await res.json();
                } catch (e) {
                    console.error("Failed to load domains.json", e);
                }
            };

            const getScoreType = (score) => {
                if (score >= 5) return 'danger';
                if (score >= 4) return 'warning';
                if (score >= 3) return 'primary';
                return 'info';
            };

            const scrollToDomain = (id) => {
                const el = document.getElementById('domain-' + id);
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth' });
                }
            };

            const groupedData = computed(() => {
                const groups = {};
                papers.value.forEach(p => {
                    const dId = p.domain_id || 'general';
                    if (!groups[dId]) groups[dId] = {};
                    if (!groups[dId][p.score]) groups[dId][p.score] = [];
                    groups[dId][p.score].push(p);
                });
                const domainIds = Object.keys(groups).sort((a, b) => {
                    if (a === 'general') return 1;
                    if (b === 'general') return -1;
                    return a.localeCompare(b);
                });
                return domainIds.map(domainId => ({
                    id: domainId,
                    name: domainNames.value[domainId] || domainId,
                    scores: Object.keys(groups[domainId])
                        .sort((a, b) => b - a)
                        .map(score => ({
                            val: parseInt(score),
                            papers: groups[domainId][score]
                        }))
                }));
            });

            // 本日简报统计逻辑
            const briefingStats = computed(() => {
                if (!papers.value.length) return null;
                const total = papers.value.length;
                
                let latestDateStr = '';
                // 来源分布
                const sources = {};
                papers.value.forEach(p => { 
                    sources[p.source] = (sources[p.source] || 0) + 1;
                    if (p.date > latestDateStr) latestDateStr = p.date;
                });
                
                const date = latestDateStr ? latestDateStr.substring(0, 10) : '未知日期';

                const sourceText = Object.entries(sources)
                    .map(([s, count]) => `<strong>${s}</strong> ${count} 篇`)
                    .join('，');

                // 领域分布统计
                const domainBreakdown = groupedData.value.map(d => {
                    const scoreTexts = d.scores.map(sg => `${sg.val}分(${sg.papers.length})`).join(', ');
                    return { id: d.id, name: d.name, text: scoreTexts };
                });

                return { total, sourceText, domainBreakdown, date };
            });

            watch(groupedData, (newData) => {
                newData.forEach(domain => {
                    if (activeScoreGroups.value[domain.id] === undefined) {
                        activeScoreGroups.value[domain.id] = domain.scores
                            .filter(sg => sg.val >= 3)
                            .map(sg => sg.val);
                    }
                });
            }, { immediate: true });

            onMounted(() => {
                fetchPapers();
                fetchDomains();
            });
            return { briefingStats, groupedData, getScoreType, activeScoreGroups, scrollToDomain };
        }
    }).use(ElementPlus)
    for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
      app.component(key, component);
    }
    app.mount('#app');
</script>
</body>
</html>
